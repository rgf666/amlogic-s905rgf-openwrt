#===================================================================================== 
# https://github.com/ophub/amlogic-s9xxx-openwrt 
# Description: Build OpenWrt using releases files 
#===================================================================================== 
name: Build OpenWrt using releases files 

on: 
  repository_dispatch:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Select the source branch"
        required: false
        default: "immortalwrt_master"  # 默认使用 ImmortalWrt 主分支
        type: choice
        options:
          - immortalwrt_master  
          - openwrt_main
          - lede_master
      openwrt_board:
        description: "Select device board"
        required: false
        default: "s905w"  # 锁定您的 S905W 盒子
        type: choice
        options:
          - s905w               
          - s905d
          - s905x3
          - s922x
          - amlogic             
          - all                 
      openwrt_kernel:
        description: "Select kernel version"
        required: false
        default: "5.15.y"      # 锁定 S905W 最稳定的 5.15 内核
        type: choice
        options:
          - 5.15.y              
          - 6.1.y
          - 6.6.y
      auto_kernel:
        description: "Auto use the latest kernel"
        required: false
        default: true
        type: boolean
      kernel_repo:
        description: "Set the kernel repository"
        required: false
        default: "ophub/kernel"
        type: choice
        options:
          - ophub/kernel
      kernel_usage:
        description: "Set the tags of the stable kernel."
        required: false
        default: "stable"
        type: choice
        options:
          - stable
          - flippy
          - beta
      openwrt_ip:
        description: "Set OpenWrt default IP address."
        required: false
        default: "192.168.1.1"
      openwrt_storage:
        description: "Select image storage type."
        required: false
        default: "temp"          # 仅保留固件，节省空间
        type: choice
        options:
          - temp                 
          - save                 
      builder_name:
        description: "Set OpenWrt builder signature."
        required: false
        default: "ophub"
        type: choice
        options:
          - ophub
          - angel
          - yourname

env: 
  TZ: Asia/Shanghai           # 设置时区
  # 【核心修改】在这里集成 OpenClash 及其必要依赖
  CUSTOM_PACKAGES: "luci-app-openclash luci-compat luci-lib-ipkg"

jobs: 
  setup: 
    runs-on: ubuntu-24.04
    outputs: 
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps: 
      - name: Set build matrix based on source_branch input
        id: set-matrix
        run: |
          if [[ "${{ inputs.source_branch }}" == "all" ]]; then
            MATRIX='{"include":[{"branch":"openwrt_main"},{"branch":"lede_master"},{"branch":"immortalwrt_master"}]}'
          else
            MATRIX='{"include":[{"branch":"${{ inputs.source_branch }}"}]}'
          fi
          echo "matrix=${MATRIX}" >> "${GITHUB_OUTPUT}"

  build: 
    needs: setup
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}
    permissions: 
      contents: write
    strategy: 
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    name: build-${{ matrix.branch }}
    steps: 
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize the build environment
        id: init
        env: 
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-make-openwrt-depends)
          sudo -E systemctl daemon-reload
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo -E timedatectl set-timezone "${TZ:-Asia/Shanghai}"
          sudo -E ntpdate ntp.ubuntu.com 0.pool.ntp.org || true
          sudo -E timedatectl set-ntp true
          date -u
          timedatectl status || true
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create virtual disk for extended storage
        id: disk
        run: |
          root_avail=$(df --block-size=1G / | tail -1 | awk '{print $4}')
          root_size=$(( root_avail - 4 ))
          [[ "${root_size}" -gt 0 ]] || { echo "Error: Insufficient space on /: ${root_avail}G available"; exit 1; }
          sudo truncate -s "${root_size}"G /root.img
          build_dev=$(sudo losetup --find --show /root.img)
          echo "Using /: ${root_size}G"
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 "${build_dev}"
          sudo mkdir -p /builder
          sudo mount "${build_dev}" /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> ${GITHUB_OUTPUT}

            - name: Download OpenWrt [ ${{ matrix.branch }} ]
        id: down
        working-directory: /builder
        if: ${{ steps.init.outputs.status == 'success' && !cancelled() }}
        run: |
          # 1. 根据输入的分支前缀，确定对应的官方仓库 URL
          if [[ "${{ matrix.branch }}" =~ ^openwrt ]]; then
            REPO_URL="https://github.com/openwrt/openwrt"
            REPO_NAME="openwrt"
          elif [[ "${{ matrix.branch }}" =~ ^lede ]]; then
            REPO_URL="https://github.com/coolsnowwolf/lede"
            REPO_NAME="lede"
          elif [[ "${{ matrix.branch }}" =~ ^immortalwrt ]]; then
            REPO_URL="https://github.com/immortalwrt/immortalwrt"
            REPO_NAME="immortalwrt"
          else
            echo "Error: Unknown source code repository."
            exit 1
          fi
          
          # 2. 提取分支名称（去掉前缀后的部分，如 master, main 等）
          REPO_BRANCH="${{ matrix.branch }}_${{ inputs.openwrt_board }}_${{ inputs.openwrt_kernel }}"
          # 注意：ophub 的脚本通常会在 tag_name 中包含类似 "OpenWrt_immortalwrt_master_s905w-..." 的格式
          # 这里简化处理，主要确保能匹配到对应的仓库

          echo "Searching for latest release in: $REPO_URL"

          # 3. 使用 GitHub API 查询该仓库最新的 Release
          # jq 用于解析 JSON，查找包含对应分支信息的最新 rootfs.tar.gz 文件
          latest_version=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "$REPO_URL/releases?per_page=20" | \
            jq -r --arg BRANCH "${{ matrix.branch }}" \
            --arg BOARD "${{ inputs.openwrt_board }}" \
            --arg KERNEL "${{ inputs.openwrt_kernel }}" \
            '[.[] | select(.tag_name | contains($BRANCH) and contains($BOARD) and contains($KERNEL))] | 
             map(.assets[] | select(.name | endswith("-rootfs.tar.gz"))) | 
             sort_by(.updated_at) | reverse | .[0] | 
             {url: .url, name: .name, tag: .tag_name}')

          # 4. 检查是否找到了有效的下载链接
          if [[ -z "$latest_version" || "$latest_version" == "null" ]]; then
            echo "Error: Failed to resolve OpenWrt rootfs download URL for branch: ${{ matrix.branch }}"
            echo "Please ensure there are existing Releases in the repository that match your configuration."
            exit 1
          fi

          # 5. 提取下载 URL 和文件名
          latest_url="$(echo $latest_version | jq -r '.url')"
          openwrt_filename="$(echo $latest_version | jq -r '.name')"
          echo "Found latest release: $openwrt_filename"

          # 6. 执行下载
          echo "Downloading: $openwrt_filename ..."
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "$latest_url" \
            -o "openwrt/output/$openwrt_filename"

          # 7. 验证下载结果
          if [[ $? -ne 0 ]]; then
            echo "Error: Download failed."
            exit 1
          fi

          echo "Download completed successfully."
          echo "status=success" >> ${GITHUB_OUTPUT}

          source_branch_input="${{ matrix.branch }}"
          REPO_NAME="${source_branch_input%_*}"
          REPO_BRANCH="${source_branch_input##*_}"
          armsr_tarfile_path="openwrt/output"
          [[ -d "${armsr_tarfile_path}" ]] || mkdir -p ${armsr_tarfile_path}
          ln -sf /builder/openwrt ${{ github.workspace }}/openwrt
          ln -sf /builder/openwrt /home/runner/work/_actions/ophub/amlogic-s9xxx-openwrt/main/openwrt

          latest_version=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases?per_page=20 | \
            jq -r --arg RTK "OpenWrt_${{ matrix.branch }}_" \
            --arg BOARD "-rootfs.tar.gz" \
            '[.[] | select(.tag_name | contains($RTK))] | map(.assets[] | select(.name | endswith($BOARD))) | sort_by(.updated_at) | reverse | .[0] | {data: .updated_at, url: .url, name: .name}')

          [[ -z "${latest_version}" || "${latest_version}" == "null" ]] && {
            echo "Error: Failed to resolve OpenWrt rootfs download URL."
            exit 1
          }

          latest_url="$(echo ${latest_version} | jq -r '.url')"
          openwrt_filename="$(echo ${latest_version} | jq -r '.name')"

          echo "Downloading: ${openwrt_filename}"
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${latest_url}" \
            -o "${armsr_tarfile_path}/${openwrt_filename}"

          [[ "${?}" -ne "0" ]] && echo "Error: Download failed." && exit 1
          echo "build_tag=OpenWrt_${{ matrix.branch }}_${{ inputs.openwrt_storage }}_$(date +"%Y.%m")" >> ${GITHUB_ENV}
          df -hT ${PWD}
          echo "REPO_URL=${REPO_URL}" >> ${GITHUB_ENV}
          echo "REPO_NAME=${REPO_NAME}" >> ${GITHUB_ENV}
          echo "REPO_BRANCH=${REPO_BRANCH}" >> ${GITHUB_ENV}
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Package OpenWrt for target boards
        if: ${{ steps.down.outputs.status == 'success' && !cancelled() }}
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: openwrt/output/*rootfs.tar.gz
          openwrt_ip: ${{ inputs.openwrt_ip }}
          openwrt_board: ${{ inputs.openwrt_board }}
          openwrt_kernel: ${{ inputs.openwrt_kernel }}
          auto_kernel: ${{ inputs.auto_kernel }}
          kernel_repo: ${{ inputs.kernel_repo }}
          kernel_usage: ${{ inputs.kernel_usage }}
          builder_name: ${{ inputs.builder_name }}

      - name: Upload packaged OpenWrt to Release
        uses: ophub/upload-to-releases@main
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        with:
          tag: ${{ env.build_tag }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allow_updates: true
          remove_artifacts: false
          replaces_artifacts: true
          make_latest: true
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ### OpenWrt Image Information
            - Default IP: `192.168.1.1`
            - Default username: `root`
            - Default password: `password`
            - Default WIFI name: `OpenWrt`
            - Default WIFI password: `none`

            ### Install to EMMC
            - Login to OpenWrt → `System` → `Amlogic Service` → `Install OpenWrt`

            ### OpenWrt source code
            - [${{ env.REPO_NAME }}](${{ env.REPO_URL }}/tree/${{ env.REPO_BRANCH }})

            ### Applicable Platform
            - 🐧 `arm64`
            - 🐋 Docker image: https://hub.docker.com/u/ophub
